<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ripple-effect {
            position: relative;
            overflow: hidden;
            transform: translate3d(0, 0, 0);
        }
        .ripple-effect::after {
            content: "";
            display: block;
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            background-image: radial-gradient(circle, #fff 10%, transparent 10.01%);
            background-repeat: no-repeat;
            background-position: 50%;
            transform: scale(10, 10);
            opacity: 0;
            transition: transform .5s, opacity 1s;
        }
        .ripple-effect:active::after {
            transform: scale(0, 0);
            opacity: .2;
            transition: 0s;
        }
        
        /* Form Autofill styles for Dark Mode */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{

<body class="bg-background text-on-background font-body-md antialiased overflow-x-hidden selection:bg-primary-container selection:text-on-primary-container">
<!-- Suppressed NavBars: The TopNavBar and BottomNavBar are deliberately excluded from this transactional Sign Up/Login page as per the semantic shell mandate. -->

<!-- Cinematic Blurred Poster Background -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">

</div>

</div>

<div class="p-8 md:p-10 flex flex-col gap-8">

<h1 class="font-display-hero text-title-lg font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-deep-purple via-coral-pink to-peach-orange">
                        CineScope

<p class="font-body-md text-body-md text-on-surface-variant mt-2 opacity-80">Your gateway to cinematic worlds.</p>
</div>
<!-- Toggle Tabs -->

                        Sign Up
                    </button>

<!-- Form Area -->

<!-- Floating Label Input: Email -->
<div class="relative group">
<input class="block w-full bg-surface-container/80 border border-outline-variant/50 rounded-xl px-4 pt-6 pb-2 text-on-surface font-body-md text-body-md focus:outline-none focus:border-primary/70 focus:bg-surface-container focus:ring-1 focus:ring-primary/50 peer transition-all duration-300 placeholder-transparent" id="email" placeholder="Email Address" required="" type="email"/>
<label class="absolute left-4 top-4 text-on-surface-variant font-body-md text-body-md transition-all duration-300 transform -translate-y-2 scale-75 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-2 peer-focus:text-primary z-10 pointer-events-none" for="email">
                            Email Address
                        </label>
</div>
<!-- Floating Label Input: Password -->
<div class="relative group">
<input class="block w-full bg-surface-container/80 border border-outline-variant/50 rounded-xl px-4 pt-6 pb-2 text-on-surface font-body-md text-body-md focus:outline-none focus:border-primary/70 focus:bg-surface-container focus:ring-1 focus:ring-primary/50 peer transition-all duration-300 placeholder-transparent" id="password" placeholder="Password" required="" type="password"/>
<label class="absolute left-4 top-4 text-on-surface-variant font-body-md text-body-md transition-all duration-300 transform -translate-y-2 scale-75 origin-[0] peer-placeholder-shown:scale-100 peer-placeholder-shown:translate-y-0 peer-focus:scale-75 peer-focus:-translate-y-2 peer-focus:text-primary z-10 pointer-events-none" for="password">
                            Password
                        </label>
<!-- Visibility Toggle Icon -->
<button class="absolute right-4 top-4 text-on-surface-variant hover:text-primary transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility_off</span>
</button>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end mt-[-8px]">
<a class="font-label-sm text-label-sm text-primary/80 hover:text-primary transition-colors" href="#">Forgot Password?</a>
</div>
<!-- Primary CTA -->
<button class="w-full py-3.5 mt-2 rounded-xl bg-gradient-to-r from-deep-purple to-coral-pink text-on-primary-container font-label-sm text-label-sm flex items-center justify-center gap-2 ripple-effect transition-transform duration-300 hover:scale-[1.02] hover:shadow-[0_8px_20px_rgba(132,94,194,0.3)] group relative overflow-hidden" type="submit">
<div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300 ease-out"></div>
<span class="relative z-10 tracking-wider uppercase">Log In</span>
<span class="material-symbols-outlined relative z-10 group-hover:translate-x-1 transition-transform duration-300">arrow_forward</span>
</button>

<div class="flex items-center gap-4 py-2">
<div class="h-px bg-outline-variant/40 flex-1"></div>
<span class="text-on-surface-variant/60 font-label-sm text-label-sm uppercase tracking-widest">Or</span>
<div class="h-px bg-outline-variant/40 flex-1"></div>

<div class="flex flex-col gap-3">
<button class="w-full py-3 rounded-xl bg-surface-container/40 border border-outline-variant/30 text-on-surface font-label-sm text-label-sm flex items-center justify-center gap-3 hover:bg-white/5 hover:border-outline-variant/60 transition-all duration-300 ripple-effect backdrop-blur-sm group" type="button">

<div class="w-5 h-5 rounded-full bg-gradient-to-tr from-yellow-400 via-red-500 to-blue-500 p-[2px] opacity-80 group-hover:opacity-100 transition-opacity">
<div class="w-full h-full bg-surface-container-highest rounded-full flex items-center justify-center">
<span class="text-[10px] font-bold text-white leading-none">G</span>
</div>
</div>
<span class="tracking-wide">Continue with Google</span>
</button>
<button class="w-full py-3 rounded-xl bg-surface-container/40 border border-outline-variant/30 text-on-surface font-label-sm text-label-sm flex items-center justify-center gap-3 hover:bg-white/5 hover:border-outline-variant/60 transition-all duration-300 ripple-effect backdrop-blur-sm" type="button">
<span class="material-symbols-outlined text-xl opacity-80">ios</span>
<span class="tracking-wide">Continue with Apple</span>
</button>
</div>
</div>
